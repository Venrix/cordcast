name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build worker
        working-directory: worker
        run: dotnet publish -r win-x64 -c Release -o publish

      - name: Copy worker binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force app\assets\worker | Out-Null
          Copy-Item worker\publish\CordCastWorker.exe app\assets\worker\CordCastWorker.exe
          Copy-Item vendor\win64\bass.dll app\assets\worker\bass.dll
          Copy-Item vendor\win64\opus.dll app\assets\worker\opus.dll
          Copy-Item vendor\win64\libsodium.dll app\assets\worker\libsodium.dll
          Copy-Item vendor\win64\libdave.dll app\assets\worker\libdave.dll

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        working-directory: app
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows release
        shell: pwsh
        working-directory: app
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          flutter build windows --release --build-name=$version --build-number=${{ github.run_number }}

      - name: Build installer
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /DAppVersion=$version

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -Path app\build\windows\x64\runner\Release\.portable -ItemType File -Force
          Compress-Archive `
            -Path app\build\windows\x64\runner\Release\* `
            -DestinationPath cordcast-${{ github.ref_name }}-windows-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            app/build/windows/installer/CordCast-*-windows-setup.exe
            cordcast-*-windows-portable.zip

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build worker
        working-directory: worker
        run: dotnet publish -r linux-x64 -c Release -o publish

      - name: Copy worker binary
        run: |
          mkdir -p app/assets/worker
          cp worker/publish/CordCastWorker app/assets/worker/CordCastWorker
          chmod +x app/assets/worker/CordCastWorker

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev

      - name: Enable Linux desktop
        working-directory: app
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Linux release
        working-directory: app
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          flutter build linux --release --build-name="$version" --build-number=${{ github.run_number }}

      - name: Package tar.gz
        run: |
          cd app/build/linux/x64/release/bundle
          tar -czf ../../../../../../cordcast-${{ github.ref_name }}-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: cordcast-*-linux-x64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
